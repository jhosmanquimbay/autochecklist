spring.application.name=demostracion

# =============================
# LOGS
# =============================
logging.level.root=WARN
logging.level.com.example.demostracion=INFO
logging.level.org.hibernate.SQL=WARN

# =============================
# CONEXIÓN A MYSQL (RAILWAY INTERNO)
# =============================
spring.datasource.url=jdbc:mysql://mysql.railway.internal:3306/railway?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=zOGZdnNFRYaevMbFnWVyMmhMSXclYWle
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=never

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ⚠️ Hibernate detecta solo el dialecto (evita warning)
# spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# =============================
# HIKARI (POOL)
# =============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# =============================
# SERVIDOR
# =============================
server.port=${PORT:8080}
server.ssl.enabled=false

# =============================
# SMTP (ENV VARIABLES)
