spring.application.name=demostracion

# =============================
# PERFIL: PRODUCCIÓN
# =============================
logging.level.root=WARN
logging.level.com.example.demostracion=INFO
logging.level.org.hibernate.SQL=WARN


# =============================
# CONEXIÓN A MYSQL (PRODUCCIÓN)
# =============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=never

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Pool de conexiones (producción - OPTIMIZADO)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.auto-commit=true

# Enable TCP_KEEPALIVE
spring.datasource.hikari.data-source-properties.serverTimezone=UTC

server.port=${PORT:8080}
server.ssl.enabled=false
# =============================
# CONFIGURACIÓN SMTP GMAIL
# =============================
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
spring.mail.properties.mail.debug=false

# =============================
# CONFIGURACIÓN IMAP (RECIBIR CORREOS)
# =============================
mail.inbound.protocol=${MAIL_INBOUND_PROTOCOL}
mail.inbound.host=${MAIL_INBOUND_HOST}
mail.inbound.port=${MAIL_INBOUND_PORT}
mail.inbound.user=${MAIL_INBOUND_USERNAME}
mail.inbound.password=${MAIL_INBOUND_PASSWORD}
mail.inbound.folder=INBOX
mail.inbound.poll-interval-ms=${MAIL_INBOUND_POLL_INTERVAL}
mail.inbound.mark-seen=true
mail.inbound.attachments-base=uploads/correos
mail.inbound.fallback-user-id=

# =============================
# LIMITES DE ARCHIVOS
# =============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.enabled=true

# =============================
# HTTPS EN PRODUCCIÓN
# =============================
#server.ssl.enabled=true
#server.ssl.key-store=${KEYSTORE_PATH}
#server.ssl.key-store-password=${KEYSTORE_PASSWORD}
#server.ssl.key-store-type=PKCS12

# Compresión de respuestas
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain

# =============================
# SEGURIDAD
# =============================
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=Strict

# =============================
# RESILIENCE4J - REINTENTOS
# =============================
resilience4j.retry.configs.default.max-attempts=5
resilience4j.retry.configs.default.wait-duration=2000
resilience4j.retry.configs.default.retry-exceptions=java.io.IOException,java.net.SocketTimeoutException,org.springframework.mail.MailSendException
resilience4j.retry.instances.email-service.base-config=default
resilience4j.retry.instances.email-service.max-attempts=5

# =============================
# RESILIENCE4J - CIRCUIT BREAKER
# =============================
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=120000
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.email-service.base-config=default

# =============================
# REDIS
# =============================
spring.redis.enabled=true
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.timeout=5000

