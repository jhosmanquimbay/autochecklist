spring.application.name=demostracion

# =============================
# LOGS
# =============================
logging.level.root=WARN
logging.level.com.example.demostracion=INFO
logging.level.org.hibernate.SQL=WARN

# =============================
# AUTO-CONFIGURACIÓN: deshabilitar Redis (no disponible en Railway por defecto)
# Evita que RedisHealthIndicator marque /actuator/health como DOWN
# Se incluye también MailSenderAutoConfiguration porque MailConfig.java crea
# el bean JavaMailSender manualmente (evita conflicto de bean duplicado).
# =============================
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

# =============================
# CONEXIÓN A MYSQL (RAILWAY INTERNO)
# Railway inyecta: MYSQLHOST, MYSQLPORT, MYSQLDATABASE, MYSQLUSER, MYSQLPASSWORD
# =============================
spring.datasource.url=jdbc:mysql://${MYSQLHOST:mysql.railway.internal}:${MYSQLPORT:3306}/${MYSQLDATABASE:railway}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=never

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# =============================
# HIKARI (POOL)
# =============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# =============================
# SERVIDOR
# PORT es inyectado por Railway en tiempo de ejecución
# =============================
server.port=${PORT:8080}
server.ssl.enabled=false

# Railway termina TLS en su edge proxy y reenvía HTTP al contenedor.
# forward-headers-strategy=NATIVE permite que Spring detecte el esquema HTTPS
# original, haciendo que cookie.secure=true funcione correctamente.
server.forward-headers-strategy=NATIVE

# =============================
# SMTP — usar variables de entorno de Railway
# =============================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:autochecklistoficial@gmail.com}
spring.mail.password=${MAIL_PASSWORD:nmurogifknsmzlkf}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
# debug=false en producción para no saturar logs con trazas SMTP
spring.mail.properties.mail.debug=false

# =============================
# IMAP — desactivado en producción para evitar intentos de conexión continuos
# Para habilitarlo: agregar mail.inbound.enabled=true en variables de Railway
# =============================
mail.inbound.enabled=false

# =============================
# MULTIPART
# =============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# =============================
# COMPRESIÓN
# =============================
server.compression.enabled=true
server.compression.min-response-size=1024

# =============================
# SEGURIDAD DE SESIÓN
# cookie.secure=true funciona correctamente gracias a forward-headers-strategy=NATIVE
# =============================
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=Strict
