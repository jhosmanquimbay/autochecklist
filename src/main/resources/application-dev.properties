spring.application.name=demostracion

# =============================
# PERFIL: DESARROLLO
# =============================
logging.level.root=INFO
logging.level.com.example.demostracion=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# =============================
# CONEXIÓN A MYSQL
# =============================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/auto?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=never

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Pool de conexiones (desarrollo)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

server.port=8081

# =============================
# CONFIGURACIÓN SMTP GMAIL
# =============================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:autochecklistoficial@gmail.com}
spring.mail.password=${MAIL_PASSWORD:nmurogifknsmzlkf}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.debug=${MAIL_DEBUG:true}

# =============================
# CONFIGURACIÓN IMAP (RECIBIR CORREOS)
# =============================
mail.inbound.protocol=${MAIL_INBOUND_PROTOCOL:imaps}
mail.inbound.host=${MAIL_INBOUND_HOST:imap.gmail.com}
mail.inbound.port=${MAIL_INBOUND_PORT:993}
mail.inbound.user=${MAIL_INBOUND_USERNAME:autochecklistoficial@gmail.com}
mail.inbound.password=${MAIL_INBOUND_PASSWORD:nmurogifknsmzlkf}
mail.inbound.folder=INBOX
mail.inbound.poll-interval-ms=${MAIL_INBOUND_POLL_INTERVAL:60000}
mail.inbound.mark-seen=true
mail.inbound.attachments-base=uploads/correos
mail.inbound.fallback-user-id=

# =============================
# LIMITES DE ARCHIVOS
# =============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.enabled=true

# =============================
# DESARROLLO - Sin HTTPS
# =============================
server.ssl.enabled=false

# =============================
# RESILIENCE4J - REINTENTOS
# =============================
resilience4j.retry.configs.default.max-attempts=3
resilience4j.retry.configs.default.wait-duration=1000
resilience4j.retry.configs.default.retry-exceptions=java.io.IOException,java.net.SocketTimeoutException
resilience4j.retry.instances.email-service.base-config=default
resilience4j.retry.instances.email-service.max-attempts=3

# =============================
# RESILIENCE4J - CIRCUIT BREAKER
# =============================
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=60000
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.email-service.base-config=default

# =============================
# REDIS
# =============================
spring.redis.enabled=true
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.password=
spring.redis.timeout=2000

