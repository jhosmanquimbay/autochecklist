<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="utf-8">
    <title>AUTO CHECK LIST - Correos Enviados</title>
    <link rel="stylesheet" th:href="@{/css/themes.css}">
    <link rel="stylesheet" th:href="@{/css/admin-theme.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<aside th:replace="~{fragments/correo-sidebar :: sidebar('enviados')}"></aside>

<!-- MAIN -->
<main class="main">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
    <!-- TOPBAR -->
    <div class="topbar">
        <div>
            <h1>Correos Enviados</h1>
            <span>Historial de mensajes que has enviado</span>
        </div>
    </div>

    <!-- BARRA DE BÚSQUEDA -->
    <div th:unless="${#lists.isEmpty(mensajes)}" class="search-bar-container">
        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Buscar por palabra o destinatario..." onkeyup="filterAndSearchEmails()">
        </div>
    </div>

    <div class="email-container">
        <!-- Estado vacío -->
        <div th:if="${#lists.isEmpty(mensajes)}" class="empty-state">
            <div class="empty-icon">
                <i class="fas fa-paper-plane"></i>
            </div>
            <h3>No hay mensajes enviados</h3>
            <p>Aún no has enviado ningún mensaje</p>
        </div>

        <!-- Lista de mensajes -->
        <div th:unless="${#lists.isEmpty(mensajes)}" class="email-list">
            <div th:each="m : ${mensajes}" class="email-item" th:data-email-id="${m.id}" th:onclick="|openEmailModal(${m.id})|" style="cursor: pointer;">
                <div class="email-checkbox">
                    <input type="checkbox" class="email-checkbox" th:id="'msg-' + ${m.id}" onclick="event.stopPropagation();">
                </div>
                
                <div class="email-content">
                    <div class="email-meta">
                        <div class="email-sender">
                            <span th:text="${m.destinatario != null ? m.destinatario.nombre : (m.destinatarioExterno != null ? m.destinatarioExterno : 'Destinatario desconocido')}">Destinatario</span>
                        </div>
                        <div class="email-subject" th:text="${m.asunto}">Asunto</div>
                    </div>
                    <div class="email-preview" th:text="${m.contenido == null ? '' : (m.contenido.length() > 100 ? m.contenido.substring(0,100).concat('...') : m.contenido)}">Vista previa</div>
                </div>
                
                <div class="email-date">
                    <span th:if="${m.fechaEnvio != null}" th:text="${#temporals.format(m.fechaEnvio, 'dd/MM HH:mm')}">fecha</span>
                </div>
                
                <div class="email-actions">
                    <form th:action="@{/correo/mover-papelera/{id}(id=${m.id})}" method="post" style="margin: 0;" onsubmit="event.stopPropagation(); return confirm('¿Mover este mensaje a la papelera?');">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <input type="hidden" name="usuarioId" th:value="${usuarioId}" />
                        <input type="hidden" name="origen" value="enviados" />
                        <button type="submit" class="action-btn" title="Mover a papelera">
                            <i class="fas fa-trash"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- FLOATING COMPOSE BUTTON -->
    <button id="openCompose" class="floating-compose" title="Redactar mensaje">
        <i class="fas fa-plus"></i>
    </button>
</main>

<!-- COMPOSE MODAL -->
<div id="composeModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Redactar mensaje</h3>
            <button type="button" id="closeCompose" class="modal-close">✕</button>
        </div>
        <div class="modal-body">
            <form th:action="@{/correo/enviar}" method="post" enctype="multipart/form-data" onsubmit="return validarFormularioCompose()">
                <input type="hidden" name="remitente" th:value="${usuarioId}" />
                <input type="hidden" name="origen" value="enviados" />
                
                <div class="form-group">
                    <label for="destinatarios">Para</label>
                    <input type="text" id="destinatarios" name="destinatarios" placeholder="ejemplo@dominio.com, otro@dominio.com" required />
                </div>
                
                <div class="form-group">
                    <label for="asunto">Asunto</label>
                    <input type="text" id="asunto" name="asunto" placeholder="Asunto del mensaje" />
                </div>
                
                <div class="form-group">
                    <label for="contenido">Mensaje *</label>
                    <textarea id="contenido" name="contenido" placeholder="Escribe tu mensaje aquí..." required></textarea>
                    <small style="color: var(--color-text-tertiary); font-size: 0.85rem;">El mensaje es obligatorio</small>
                </div>
                
                <div class="form-group">
                    <label for="archivos">Adjuntos</label>
                    <input type="file" id="archivos" name="archivos" multiple />
                </div>
                
                <div class="form-actions">
                    <button type="button" id="cancelCompose" class="btn btn-secondary">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Enviar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- EMAIL MODAL -->
<div id="emailModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Ver mensaje</h3>
            <button type="button" id="closeEmail" class="modal-close">✕</button>
        </div>
        <div class="modal-body" id="emailModalBody">
            <!-- Contenido del email se carga aquí -->
        </div>
    </div>
</div>

<!-- REPLY MODAL -->
<div id="replyModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Responder</h3>
            <button type="button" id="closeReply" class="modal-close">✕</button>
        </div>
        <div class="modal-body">
            <form id="replyForm" th:action="@{/correo/responder}" method="post" enctype="multipart/form-data" onsubmit="return validarRespuestaModal()">
                <input type="hidden" id="replyMensajePadreId" name="mensajePadreId" value="" />
                <input type="hidden" id="replyRemitente" name="remitente" th:value="${usuarioId}" />
                <input type="hidden" name="origen" value="enviados" />
                
                <div class="form-group">
                    <label for="replyContenidoModal">Mensaje *</label>
                    <textarea id="replyContenidoModal" name="contenido" placeholder="Escribe tu respuesta..." required></textarea>
                    <small style="color: var(--color-text-tertiary); font-size: 0.85rem;">El mensaje es obligatorio</small>
                </div>
                
                <div class="form-group">
                    <label for="replyArchivosModal">Adjuntos (opcional)</label>
                    <input type="file" id="replyArchivosModal" name="archivos" multiple />
                </div>
                
                <div class="form-actions">
                    <button type="button" id="cancelReply" class="btn btn-secondary">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Enviar respuesta</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
// Función para mostrar/ocultar sidebar
function toggleSidebar() {
    const sb = document.getElementById('sidebar');
    if (sb) sb.classList.toggle('collapsed');
}

// Auto-collapse sidebar al salir del área - Auto-expand al entrar
const sidebar = document.getElementById('sidebar');
if (sidebar) {
    sidebar.addEventListener('mouseenter', function() {
        this.classList.remove('collapsed');
    });
    sidebar.addEventListener('mouseleave', function() {
        this.classList.add('collapsed');
    });
}

// Función para toggle de submenús
function toggleSubmenu(id) {
    const submenu = document.getElementById(id);
    if (submenu) {
        submenu.style.display = submenu.style.display === 'none' ? 'block' : 'none';
    }
}

// COMPOSE MODAL
const composeModal = document.getElementById('composeModal');
const openComposeBtn = document.getElementById('openCompose');
const closeComposeBtn = document.getElementById('closeCompose');
const cancelComposeBtn = document.getElementById('cancelCompose');

if (openComposeBtn) openComposeBtn.addEventListener('click', () => composeModal.classList.add('active'));
if (closeComposeBtn) closeComposeBtn.addEventListener('click', () => composeModal.classList.remove('active'));
if (cancelComposeBtn) cancelComposeBtn.addEventListener('click', () => composeModal.classList.remove('active'));

// EMAIL MODAL
const emailModal = document.getElementById('emailModal');
const closeEmailBtn = document.getElementById('closeEmail');

if (closeEmailBtn) closeEmailBtn.addEventListener('click', () => emailModal.classList.remove('active'));

// REPLY MODAL
const replyModal = document.getElementById('replyModal');
const closeReplyBtn = document.getElementById('closeReply');
const cancelReplyBtn = document.getElementById('cancelReply');

if (closeReplyBtn) closeReplyBtn.addEventListener('click', () => replyModal.classList.remove('active'));
if (cancelReplyBtn) cancelReplyBtn.addEventListener('click', () => replyModal.classList.remove('active'));

// Cerrar modales al hacer clic fuera
[composeModal, emailModal, replyModal].forEach(modal => {
    if (modal) {
        modal.addEventListener('click', (e) => {
            if (e.target === modal) modal.classList.remove('active');
        });
    }
});

// Abrir modal de email
async function openEmailModal(id) {
    try {
        const res = await fetch('/correo/fragment/' + id);
        if (!res.ok) throw new Error('Error HTTP: ' + res.status);
        const html = await res.text();
        document.getElementById('emailModalBody').innerHTML = html;
        emailModal.classList.add('active');
    } catch (e) {
        console.error('Error al cargar mensaje:', e);
        alert('Error al cargar el mensaje: ' + e.message);
    }
}

// Validar formulario de envío
function validarFormularioCompose() {
    const dest = document.getElementById('destinatarios').value.trim();
    const cont = document.getElementById('contenido').value.trim();
    if (!dest || !cont) {
        alert('Por favor rellena los campos obligatorios');
        return false;
    }
    return true;
}

// Validar respuesta
function validarRespuestaModal() {
    const cont = document.getElementById('replyContenidoModal').value.trim();
    if (!cont) {
        alert('El mensaje no puede estar vacío');
        return false;
    }
    return true;
}

// Filtrar mensajes por búsqueda
function filterAndSearchEmails() {
    const searchInput = document.getElementById('searchInput');
    if (!searchInput) return;

    const filter = searchInput.value.toLowerCase();
    const items = document.querySelectorAll('.email-item');

    items.forEach(item => {
        const text = item.textContent.toLowerCase();
        item.style.display = text.includes(filter) ? 'flex' : 'none';
    });
}
</script>

</body>
</html>
